name: Set Cloudflare Worker Secret

on:
  push:
    branches: [main]

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Set NEWSAPI_KEY on Cloudflare Worker
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/news/secrets" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"NEWSAPI_KEY\",\"text\":\"${{ secrets.NEWSAPI_KEY }}\",\"type\":\"secret_text\"}" \
            | jq .
